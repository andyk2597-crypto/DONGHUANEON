                { id: 18, title: "Battle Through The Heavens S5 - Ep 205", dino: "Minggu", tags: ["kopi","gadget"], img: "https://animexin.dev/wp-content/uploads/2024/10/BTTH-S5-Ax.jpg", servers: { 1: "https://rumble.com/embed/v79ps7q/?pub=4peqws", 2: "https://geo.dailymotion.com/player/x1IXQFVCmaphYxH6WAS", 3: "https://www.dailymotion.com/embed/video/x8x9g8e" } },
                { id: 19, title: "Tales of Herding Gods - Ep 88", dino: "Minggu", tags: ["outdoor"], img: "https://animexin.dev/wp-content/uploads/2024/10/tohg-nianfan2.webp", servers: { 1: "https://rumble.com/embed/v79evus/?pub=4peqws", 2: "https://ok.ru/videoembed/14704566995508?nochat=1", 3: "https://www.dailymotion.com/embed/video/x8x9g8e" } }
            ];

            const ADS_REGISTRY = {
                "gaming": [{ h: "Asus ROG Phone Pro", d: "Spesifikasi dewa gae nonton Donghua Ultra HD.", l: "#" }],
                "sepeda": [{ h: "Polygon Collosus Premium", d: "Diskon mbois gae komunitas streaming.", l: "#" }],
                "kopi": [{ h: "Kapal Api Black Espresso", d: "Cek gak ngantuk pas maraton rilis bengi.", l: "#" }],
                "gadget": [{ h: "Kursi Gaming Ergonomis", d: "Menebalkan stamina pinggang, anti-boyoken.", l: "#" }],
                "outdoor": [{ h: "Eiger Adventure Shield", d: "Jaket anti-banyu mabar nang njobo omah.", l: "#" }]
            };

            let currentActiveId = null;
            let currentSelectedServer = 1;
            let slideshowIntervalId = null;
            let currentSlideIndex = 0;
            const trendingList = BACKEND_API_MOCK.slice(0, 5);

            function escapeHTML(str) {
                return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
            }

            // HACKER FIX: Fungsi exitHandler digawe cek gak crash!
            const exitHandler = () => {
                if (!document.fullscreenElement && !document.webkitIsFullScreen && !document.mozFullScreen && !document.msFullscreenElement) {
                    document.getElementById("mainPlayerPanel").classList.remove("force-fullscreen");
                    document.getElementById("triggerLandscapeHack").innerText = "⚡ REKAYASA HORIZONTAL";
                }
            };

            document.addEventListener("DOMContentLoaded", () => {
                initInterfaceRenderers();
                setupEventBindings();
                startPlaceholderTicker();
                initTelemetrySim();
            });

            function initInterfaceRenderers() {
                const slider = document.getElementById("sliderRenderer");
                slider.innerHTML = trendingList.map((item, idx) => `
                    <div class="slider-card" data-id="${item.id}">
                        <img src="${item.img}" alt="Trending">
                        <div class="meta">
                            <h4>${escapeHTML(item.title)}</h4>
                            <p>🔥 Trending #${idx + 1}</p>
                        </div>
                    </div>
                `).join('');

                renderMatrixVirtual(BACKEND_API_MOCK);
            }

            function renderMatrixVirtual(dataList) {
                const container = document.getElementById("matrix-renderer");
                const infoKosong = document.getElementById("infoKosong");
                container.innerHTML = "";

                if (dataList.length === 0) {
                    infoKosong.style.display = "block";
                    return;
                }
                infoKosong.style.display = "none";

                const chunkData = dataList.slice(0, 12);
                const fragment = document.createDocumentFragment();

                chunkData.forEach(item => {
                    const card = document.createElement("div");
                    card.className = "matrix-card";
                    card.setAttribute("data-id", item.id);

                    const isMovie = item.title.toLowerCase().includes("movie");
                    const isEnd = item.title.toLowerCase().includes("completed");
                    const badgeStatus = isMovie ? '<div class="status-badge Movie">Movie</div>' : (isEnd ? '<div class="status-badge Completed">End</div>' : '');
                    
                    const epMatch = item.title.match(/Ep\s*(\d+)/i);
                    const badgeEp = epMatch ? `Ep ${epMatch[1]}` : "HD";

                    card.innerHTML = `
                        <div class="badge-ep">${badgeEp}</div>
                        ${badgeStatus}
                        <img src="${item.img}" alt="Cover" loading="lazy">
                        <div class="info"><h3>${escapeHTML(item.title)}</h3></div>
                    `;
                    fragment.appendChild(card);
                });

                requestAnimationFrame(() => {
                    container.appendChild(fragment);
                    if (dataList.length > 12) {
                        const tail = document.createElement("div");
                        tail.style = "grid-column:1/-1; text-align:center; font-size:11px; color:#6f7bb0; padding:10px;";
                        tail.innerText = `⚡ Auto-Truncated Engine: ${dataList.length - 12} judul liyane didhelikno ben RAM HP-mu hemat.`;
                        container.appendChild(tail);
                    }
                });
            }

            function setupEventBindings() {
                document.body.addEventListener("click", (e) => {
                    const musik = document.getElementById("neonThemeMusic");
                    if (musik && musik.paused && !currentActiveId) {
                        musik.play().catch(() => {});
                    }

                    const card = e.target.closest(".matrix-card, .slider-card");
                    if (card) {
                        bootstrapStreamEngine(parseInt(card.getAttribute("data-id"), 10));
                        return;
                    }

                    const srvBtn = e.target.closest(".server-btn");
                    if (srvBtn) {
                        const targetSrv = parseInt(srvBtn.getAttribute("data-srv"), 10);
                        switchServerHub(targetSrv);
                    }
                });

                document.getElementById("searchInput").addEventListener("input", (e) => {
                    const keyword = e.target.value.toLowerCase().trim();
                    const filterData = BACKEND_API_MOCK.filter(x => x.title.toLowerCase().includes(keyword));
                    renderMatrixVirtual(filterData);
                    document.getElementById("sectionTitle").innerText = keyword ? `Hasil Golekan: "${keyword}"` : "Database Donghua Neon Premium";
                });

                document.getElementById("playerContainer").addEventListener("click", (e) => {
                    if (e.target.closest("#core-player")) {
                        bootstrapStreamEngine(trendingList[currentSlideIndex].id);
                    }
                });

                document.getElementById("closeTheaterBtn").addEventListener("click", shutdownPlayerEngine);

                const toggleFullscreenMatrix = () => {
                    const panel = document.getElementById("mainPlayerPanel");
                    const docEl = document.documentElement;
                    
                    if (panel.classList.contains("force-fullscreen")) {
                        if (document.exitFullscreen) { document.exitFullscreen().catch(()=>{}); }
                        else if (document.webkitExitFullscreen) { document.webkitExitFullscreen().catch(()=>{}); }
                        
                        panel.classList.remove("force-fullscreen");
                        document.getElementById("triggerLandscapeHack").innerText = "⚡ REKAYASA HORIZONTAL";
                    } else {
                        if (docEl.requestFullscreen) { docEl.requestFullscreen().catch(()=>{}); }
                        else if (docEl.webkitRequestFullscreen) { docEl.webkitRequestFullscreen().catch(()=>{}); }

                        panel.classList.add("force-fullscreen");
                        document.getElementById("triggerLandscapeHack").innerText = "✕ VERTIKAL";
                    }
                };

                document.getElementById("triggerLandscapeHack").addEventListener("click", toggleFullscreenMatrix);
                document.getElementById("floatingExitBtn").addEventListener("click", toggleFullscreenMatrix);
                
                document.addEventListener('fullscreenchange', exitHandler);
                document.addEventListener('webkitfullscreenchange', exitHandler);
            }

            function startPlaceholderTicker() {
                // ANTI RAM LEAK: Resikno interval sakdurunge nggae anyar
                if (slideshowIntervalId) { clearInterval(slideshowIntervalId); }

                const updateTicker = () => {
                    const box = document.getElementById("core-player");
                    if (!box) return;
                    const cur = trendingList[currentSlideIndex];
                    box.style.backgroundImage = `url('${cur.img}')`;
                    document.getElementById("slide-title").innerText = cur.title;
                    document.getElementById("slide-badge").innerText = `🔥 RECOMMENDATION SYSTEM #${currentSlideIndex + 1}`;
                };
                updateTicker();
                slideshowIntervalId = setInterval(() => {
                    currentSlideIndex = (currentSlideIndex + 1) % trendingList.length;
                    updateTicker();
                }, 5000);
            }

            function bootstrapStreamEngine(id) {
                const node = BACKEND_API_MOCK.find(x => x.id === id);
                if (!node) return;

                const oldIframe = document.querySelector("#playerContainer iframe");
                if (oldIframe) { oldIframe.src = "about:blank"; }

                const musik = document.getElementById("neonThemeMusic");
                if (musik) musik.pause();

                if (slideshowIntervalId) { clearInterval(slideshowIntervalId); slideshowIntervalId = null; }
                currentActiveId = id;

                document.getElementById("active-title").innerText = node.title;
                document.getElementById("active-tags").innerText = `Dino Rilis: ${node.dino} | Node Core Protocol Active`;

                injectIframeSecure(node.servers[currentSelectedServer]);
                injectSponsorNodes(node.tags);

                const playerPanel = document.getElementById("mainPlayerPanel");
                playerPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            function injectIframeSecure(url) {
                // HARDENING SECURITY OVERRIDE: Sandbox tak optimalno gae stream
                document.getElementById("playerContainer").innerHTML = `
                    <iframe src="${url}" 
                            width="100%" height="100%" 
                            allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true" 
                            sandbox="allow-forms allow-pointer-lock allow-popups allow-same-origin allow-scripts allow-top-navigation allow-popups-to-escape-sandbox"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            frameborder="0">
                    </iframe>
                `;
            }

            function switchServerHub(srvNum) {
                currentSelectedServer = srvNum;
                document.querySelectorAll("#serverSelectorGrp .server-btn").forEach(b => b.classList.remove("active"));
                document.querySelector(`#serverSelectorGrp [data-srv="${srvNum}"]`).classList.add("active");

                const names = { 1: "SERVER 1 (Rumble)", 2: "SERVER 2 (OK.ru)", 3: "SERVER 3 (Serepan)" };
                document.getElementById("lbl-active-server").innerText = names[srvNum];

                if (currentActiveId) {
                    const node = BACKEND_API_MOCK.find(x => x.id === currentActiveId);
                    if (node) injectIframeSecure(node.servers[srvNum]);
                }
            }

            function injectSponsorNodes(tags) {
                const box = document.getElementById("native-ads-shuttle");
                let adsBuffer = "";
                tags.forEach(t => {
                    if (ADS_REGISTRY[t]) {
                        ADS_REGISTRY[t].forEach(a => {
                            adsBuffer += `
                                <div class="content-node-item">
                                    <div class="badge">SPONSOR ENCRYPTED</div>
                                    <h4>${escapeHTML(a.h)}</h4>
                                    <p>${escapeHTML(a.d)}</p>
                                    <a href="${a.l}">Sikat Garan →</a>
                                </div>
                            `;
                        });
                    }
                });
                box.innerHTML = adsBuffer || `<p style="color:#4b5563; font-size:12px;">No sponsor tokens for this node.</p>`;
            }

            function shutdownPlayerEngine() {
                if (document.exitFullscreen) { document.exitFullscreen().catch(()=>{}); }
                document.getElementById("mainPlayerPanel").classList.remove("force-fullscreen");
                document.getElementById("triggerLandscapeHack").innerText = "⚡ REKAYASA HORIZONTAL";

                currentActiveId = null;
                document.getElementById("active-title").innerText = "Pilih Judul Film Ring Ngisor";
                document.getElementById("active-tags").innerText = "Status Node: Main System Standby Cloud Slideshow Active";
                
                document.getElementById("playerContainer").innerHTML = `
                    <div id="core-player" class="placeholder-box" style="cursor: pointer;">
                        <div class="placeholder-content">
                            <div class="show-badge" id="slide-badge">⚡ TRENDING RECOMMENDED</div>
                            <h3 id="slide-title">Loading Premium Core...</h3>
                            <p>Klik nang kene utowo judul ing ngisor gawe langsung muter film</p>
                        </div>
                    </div>
                `;
                startPlaceholderTicker();
            }

            function initTelemetrySim() {
                setInterval(() => {
                    document.getElementById('userOnline').textContent = Math.floor(Math.random() * (620 - 480 + 1)) + 480;
                    const logs = ["NODE_OK", "AUTO_SCROLL_ANCHOR", "GC_RAM_CLEANED", "STABLE_V7"];
                    document.getElementById('liveLogs').textContent = `[SYS] ${logs[Math.floor(Math.random() * logs.length)]} -> hash_${(Math.random() + 1).toString(36).substring(7).toUpperCase()}`;
                }, 4000);
            }
        })();
    </script>
